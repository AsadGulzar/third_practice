name: Docker Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3

      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t asadgujjar103/third-practice:latest .

    - name: Push Docker Image
      run: docker push asadgujjar103/third-practice:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3

      with:
        host: ${{ secrets.EC2_NEW_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}

        script: |

         cd /home/ubuntu/third_practice

         git pull origin main

         docker compose down

         docker pull asadgujjar103/third-practice:latest

         docker compose up -d --force-recreate